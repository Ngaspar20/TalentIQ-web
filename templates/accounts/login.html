{% extends "base.html" %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 60%, #3b82f6 100%);">
    <div class="w-full max-w-md px-4">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/20 mb-4">
                <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
                    <path d="M12 20 L20 12 L28 20 L20 28 Z" fill="#3b82f6"/>
                    <circle cx="20" cy="20" r="4" fill="#fff"/>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-white">Talent<span class="text-blue-300">IQ</span></h1>
            <p class="text-blue-200 text-sm mt-1">Recrutamento Inteligente para Saúde</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Entrar na sua conta</h2>

            {% if form.errors %}
            <div class="alert-error mb-4">
                Email ou palavra-passe incorrectos. Tente novamente.
            </div>
            {% endif %}

            <form method="post" novalidate autocomplete="off">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="{{ form.username.id_for_label }}">Email</label>
                    <input type="email" name="username" id="{{ form.username.id_for_label }}"
                           class="form-input" placeholder="o.seu@email.com"
                           autocomplete="off" autofocus>
                </div>
                <div class="mb-6">
                    <label for="{{ form.password.id_for_label }}">Palavra-passe</label>
                    <input type="password" name="password" id="{{ form.password.id_for_label }}"
                           class="form-input" placeholder="••••••••" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary w-full justify-center">
                    Entrar
                </button>
            </form>

            <p class="text-center text-sm text-slate-500 mt-6">
                Não tem conta?
                <a href="/accounts/register/" class="text-blue-600 font-semibold hover:underline">Registar organização</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
