<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação submetida</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 2.5rem 2rem; max-width: 440px; width: 100%; margin: 1rem; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    </style>
</head>
<body>
<div class="card">
    <div style="width:64px;height:64px;border-radius:50%;background:#f0fdf4;border:2px solid #86efac;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;">
        <i class="fa-solid fa-circle-check" style="color:#16a34a;font-size:1.75rem;"></i>
    </div>
    <h1 style="font-size:1.3rem;font-weight:800;color:#1e293b;margin-bottom:.5rem;">Avaliação submetida</h1>
    <p style="font-size:.9rem;color:#64748b;line-height:1.6;margin-bottom:1.5rem;">
        Obrigado, <strong>{{ session.avaliador_nome }}</strong>. A sua avaliação foi registada com sucesso.<br>
        O Responsável de RH irá consolidar as avaliações do comité e tomar a decisão final.
    </p>
    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:.85rem 1rem;font-size:.82rem;color:#64748b;">
        <i class="fa-solid fa-briefcase mr-1"></i> {{ vaga.titulo }}{% if vaga.organizacao %} · {{ vaga.organizacao }}{% endif %}
    </div>
</div>
</body>
</html>
