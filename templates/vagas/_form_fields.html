<!-- Injected into #form-fields after AI analysis OR shown directly for manual entry -->
{% if metodo %}
<div class="alert-success flex items-center gap-2 mb-4">
    <i class="fa-solid fa-circle-check"></i>
    <span>Formulário preenchido automaticamente · Método: <strong>{{ metodo }}</strong> · Reveja e corrija se necessário</span>
</div>
{% endif %}

<!-- Basic Info + Requirements -->
<div class="grid grid-cols-2 gap-6 mb-6">

    <!-- Left: Basic Info -->
    <div>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
            <i class="fa-solid fa-circle-info mr-1"></i> Informação Básica
        </p>

        <div class="mb-4">
            <label>Título da Vaga *</label>
            <input type="text" name="titulo" class="form-input" placeholder="Ex: Analista de Dados Sénior" required
                   value="{{ tor.titulo|default:'' }}">
        </div>
        <div class="mb-4">
            <label>Organização</label>
            <input type="text" name="organizacao" class="form-input" placeholder="Ex: Ministério da Saúde"
                   value="{{ tor.organizacao|default:'' }}">
        </div>
        <div class="mb-4">
            <label>Departamento</label>
            <select name="departamento" class="form-input">
                {% with d=tor.departamento|default:'' %}
                <option {% if d == 'Recursos Humanos' %}selected{% endif %}>Recursos Humanos</option>
                <option {% if d == 'Tecnologia de Informação' %}selected{% endif %}>Tecnologia de Informação</option>
                <option {% if d == 'Finanças' %}selected{% endif %}>Finanças</option>
                <option {% if d == 'Operações' %}selected{% endif %}>Operações</option>
                <option {% if d == 'Saúde Pública' %}selected{% endif %}>Saúde Pública</option>
                <option {% if d == 'Marketing' %}selected{% endif %}>Marketing</option>
                <option {% if d == 'Vendas' %}selected{% endif %}>Vendas</option>
                <option {% if not d or d == 'Outro' %}selected{% endif %}>Outro</option>
                {% endwith %}
            </select>
        </div>
        <div class="mb-4">
            <label>Localização</label>
            <input type="text" name="local" class="form-input" placeholder="Ex: Maputo, Moçambique"
                   value="{{ tor.local|default:'' }}">
        </div>
        <div class="mb-4">
            <label>Modalidade</label>
            <select name="modalidade" class="form-input">
                {% with m=tor.modalidade|default:'Presencial' %}
                <option {% if m == 'Presencial' %}selected{% endif %}>Presencial</option>
                <option {% if m == 'Remoto' %}selected{% endif %}>Remoto</option>
                <option {% if m == 'Híbrido' %}selected{% endif %}>Híbrido</option>
                {% endwith %}
            </select>
        </div>
    </div>

    <!-- Right: Requirements -->
    <div>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
            <i class="fa-solid fa-graduation-cap mr-1"></i> Requisitos
        </p>

        <div class="mb-4">
            <label>Nível de Formação Mínimo</label>
            <select name="nivel_formacao" class="form-input">
                {% with n=tor.nivel_formacao|default:'' %}
                <option value="">— Seleccionar —</option>
                <option {% if 'técnico' in n or 'tecnico' in n %}selected{% endif %}>Curso Técnico</option>
                <option {% if 'licenciatura' in n %}selected{% endif %}>Licenciatura</option>
                <option {% if 'mestrado' in n %}selected{% endif %}>Mestrado</option>
                <option {% if 'doutoramento' in n %}selected{% endif %}>Doutoramento</option>
                {% endwith %}
            </select>
        </div>
        <div class="mb-4">
            <label>Anos de Experiência Mínimos</label>
            <input type="number" name="anos_experiencia_min" class="form-input" min="0" max="30"
                   value="{{ tor.anos_experiencia_min|default:0 }}">
        </div>
        <div class="mb-4">
            <label>Tipo de Contrato</label>
            <select name="tipo_contrato" class="form-input">
                {% with t=tor.tipo_contrato|default:'Tempo Inteiro' %}
                <option {% if t == 'Tempo Inteiro' %}selected{% endif %}>Tempo Inteiro</option>
                <option {% if t == 'Tempo Parcial' %}selected{% endif %}>Tempo Parcial</option>
                <option {% if t == 'Consultoria' %}selected{% endif %}>Consultoria</option>
                <option {% if t == 'Estágio' %}selected{% endif %}>Estágio</option>
                {% endwith %}
            </select>
        </div>
        <div class="mb-4">
            <label>Faixa Salarial (opcional)</label>
            <input type="text" name="salario" class="form-input" placeholder="Ex: 50.000 - 80.000 MZN"
                   value="{{ tor.salario|default:'' }}">
        </div>
        <div class="mb-4">
            <label>Prazo de Candidatura</label>
            <input type="text" name="prazo_candidatura" class="form-input" placeholder="Ex: 31 de Julho de 2026"
                   value="{{ tor.prazo_candidatura|default:'' }}">
        </div>
    </div>
</div>

<!-- Competencies -->
<div class="mb-4">
    <label>
        <i class="fa-solid fa-brain mr-1" style="color:#1d4ed8;"></i>
        Competências Requeridas *
        <span class="text-slate-400 font-normal ml-1">— separadas por vírgula</span>
    </label>
    <textarea name="competencias_input" class="form-input" rows="3"
              placeholder="Ex: Python, SQL, Power BI, Gestão de Projectos, Excel">{{ tor.competencias_requeridas|join:", " }}</textarea>
</div>

<!-- Responsibilities -->
<div class="mb-4">
    <label>
        <i class="fa-solid fa-list-check mr-1" style="color:#1d4ed8;"></i>
        Responsabilidades
    </label>
    <textarea name="responsabilidades_input" class="form-input" rows="4"
              placeholder="Uma responsabilidade por linha...">{% for r in tor.responsabilidades %}{{ r }}
{% endfor %}</textarea>
</div>

<!-- Description -->
<div class="mb-6">
    <label>
        <i class="fa-solid fa-align-left mr-1" style="color:#1d4ed8;"></i>
        Descrição da Vaga
    </label>
    <textarea name="descricao" class="form-input" rows="4"
              placeholder="Contexto e objectivo da posição...">{{ tor.descricao|default:'' }}</textarea>
</div>
