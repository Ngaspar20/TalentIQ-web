{% extends "base.html" %}
{% block title %}Editar {{ vaga.titulo }}{% endblock %}
{% block breadcrumb %}
<a href="/vagas/" class="hover:text-slate-700">Vagas</a> <span class="mx-2">›</span>
<a href="/vagas/{{ vaga.pk }}/" class="hover:text-slate-700">{{ vaga.titulo }}</a> <span class="mx-2">›</span> Editar
{% endblock %}
{% block content %}
<div class="page-header flex items-center justify-between">
    <h1 class="flex items-center gap-3">
        <i class="fa-solid fa-pen" style="color:#1d4ed8;"></i> Editar Vaga
    </h1>
    <a href="/vagas/{{ vaga.pk }}/" class="btn-secondary"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
</div>

<div class="section-card">
    <form method="post" action="/vagas/{{ vaga.pk }}/editar/">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-6 mb-6">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4"><i class="fa-solid fa-circle-info mr-1"></i> Informação Básica</p>
                <div class="mb-4"><label>Título da Vaga *</label><input type="text" name="titulo" class="form-input" required value="{{ vaga.titulo }}"></div>
                <div class="mb-4"><label>Organização</label><input type="text" name="organizacao" class="form-input" value="{{ vaga.organizacao }}"></div>
                <div class="mb-4">
                    <label>Departamento</label>
                    <select name="departamento" class="form-input">
                        <option {% if vaga.departamento == "Recursos Humanos" %}selected{% endif %}>Recursos Humanos</option>
                        <option {% if vaga.departamento == "Tecnologia de Informação" %}selected{% endif %}>Tecnologia de Informação</option>
                        <option {% if vaga.departamento == "Finanças" %}selected{% endif %}>Finanças</option>
                        <option {% if vaga.departamento == "Operações" %}selected{% endif %}>Operações</option>
                        <option {% if vaga.departamento == "Saúde Pública" %}selected{% endif %}>Saúde Pública</option>
                        <option {% if vaga.departamento == "Marketing" %}selected{% endif %}>Marketing</option>
                        <option {% if vaga.departamento == "Vendas" %}selected{% endif %}>Vendas</option>
                        <option {% if vaga.departamento == "Outro" %}selected{% endif %}>Outro</option>
                    </select>
                </div>
                <div class="mb-4"><label>Localização</label><input type="text" name="local" class="form-input" value="{{ vaga.local }}"></div>
                <div class="mb-4">
                    <label>Modalidade</label>
                    <select name="modalidade" class="form-input">
                        <option {% if vaga.modalidade == "Presencial" %}selected{% endif %}>Presencial</option>
                        <option {% if vaga.modalidade == "Remoto" %}selected{% endif %}>Remoto</option>
                        <option {% if vaga.modalidade == "Híbrido" %}selected{% endif %}>Híbrido</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label>Estado</label>
                    <select name="estado" class="form-input">
                        <option {% if vaga.estado == 'Aberta' %}selected{% endif %}>Aberta</option>
                        <option {% if vaga.estado == 'Fechada' %}selected{% endif %}>Fechada</option>
                        <option {% if vaga.estado == 'Em Pausa' %}selected{% endif %}>Em Pausa</option>
                    </select>
                </div>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4"><i class="fa-solid fa-graduation-cap mr-1"></i> Requisitos</p>
                <div class="mb-4">
                    <label>Nível de Formação Mínimo</label>
                    <select name="nivel_formacao" class="form-input">
                        <option value="">— Seleccionar —</option>
                        <option {% if vaga.nivel_formacao|lower == "curso técnico" %}selected{% endif %}>Curso Técnico</option>
                        <option {% if vaga.nivel_formacao|lower == "licenciatura" %}selected{% endif %}>Licenciatura</option>
                        <option {% if vaga.nivel_formacao|lower == "mestrado" %}selected{% endif %}>Mestrado</option>
                        <option {% if vaga.nivel_formacao|lower == "doutoramento" %}selected{% endif %}>Doutoramento</option>
                    </select>
                </div>
                <div class="mb-4"><label>Anos de Experiência Mínimos</label><input type="number" name="anos_experiencia_min" class="form-input" min="0" max="30" value="{{ vaga.anos_experiencia_min }}"></div>
                <div class="mb-4">
                    <label>Tipo de Contrato</label>
                    <select name="tipo_contrato" class="form-input">
                        <option {% if vaga.tipo_contrato == "Tempo Inteiro" %}selected{% endif %}>Tempo Inteiro</option>
                        <option {% if vaga.tipo_contrato == "Tempo Parcial" %}selected{% endif %}>Tempo Parcial</option>
                        <option {% if vaga.tipo_contrato == "Consultoria" %}selected{% endif %}>Consultoria</option>
                        <option {% if vaga.tipo_contrato == "Estágio" %}selected{% endif %}>Estágio</option>
                    </select>
                </div>
                <div class="mb-4"><label>Faixa Salarial</label><input type="text" name="salario" class="form-input" value="{{ vaga.salario }}"></div>
                <div class="mb-4"><label>Prazo de Candidatura</label><input type="text" name="prazo_candidatura" class="form-input" value="{{ vaga.prazo_candidatura }}"></div>
            </div>
        </div>
        <div class="mb-4"><label><i class="fa-solid fa-brain mr-1" style="color:#1d4ed8;"></i> Competências Requeridas <span class="text-slate-400 font-normal">— separadas por vírgula</span></label><textarea name="competencias_input" class="form-input" rows="3">{{ vaga.competencias_requeridas|join:", " }}</textarea></div>
        <div class="mb-4"><label><i class="fa-solid fa-list-check mr-1" style="color:#1d4ed8;"></i> Responsabilidades</label><textarea name="responsabilidades_input" class="form-input" rows="4">{% for r in vaga.responsabilidades %}{{ r }}
{% endfor %}</textarea></div>
        <div class="mb-6"><label><i class="fa-solid fa-align-left mr-1" style="color:#1d4ed8;"></i> Descrição</label><textarea name="descricao" class="form-input" rows="4">{{ vaga.descricao }}</textarea></div>
        <div class="flex gap-3 pt-4 border-t border-slate-100">
            <button type="submit" class="btn-primary"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
            <a href="/vagas/{{ vaga.pk }}/" class="btn-secondary"><i class="fa-solid fa-xmark"></i> Cancelar</a>
            <a href="/vagas/{{ vaga.pk }}/eliminar/" class="btn-danger ml-auto"><i class="fa-solid fa-trash"></i> Eliminar Vaga</a>
        </div>
    </form>
</div>
{% endblock %}
