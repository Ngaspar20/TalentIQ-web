{% extends "base.html" %}
{% block content %}
<div class="p-6 max-w-lg mx-auto">
  <h1 class="text-2xl font-bold text-slate-800 mb-6">Alterar a Minha Senha</h1>

  {% if error %}
  <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 border border-red-200">{{ error }}</div>
  {% endif %}

  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1">Senha Actual</label>
        <input type="password" name="senha_actual" class="form-input" required>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1">Nova Senha</label>
        <input type="password" name="nova_senha" class="form-input" placeholder="Minimo 8 caracteres" required>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar Nova Senha</label>
        <input type="password" name="confirmar_senha" class="form-input" required>
      </div>
      <div class="flex gap-3">
        <button type="submit" class="btn-primary">Guardar Nova Senha</button>
        <a href="/gestao/utilizadores/" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
